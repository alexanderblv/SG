<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seismic Transaction Sender</title>
    <meta name="description" content="Seismic Transaction Sender - Send transactions with privacy features">
    
    <!-- Preconnect for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Ethers.js -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.1/dist/ethers.umd.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Seismic Network Configuration
        const seismicNetwork = {
            id: 5124,
            name: 'Seismic Devnet',
            network: 'seismic-devnet',
            nativeCurrency: {
                decimals: 18,
                name: 'Seismic ETH',
                symbol: 'SETH',
            },
            rpcUrls: {
                public: { http: ['https://node-2.seismicdev.net/rpc'] },
                default: { http: ['https://node-2.seismicdev.net/rpc'] },
            },
            blockExplorers: {
                default: { 
                    name: 'Seismic Explorer', 
                    url: 'https://explorer-2.seismicdev.net/' 
                },
            },
            testnet: true,
        };

        // Main App Component
        const SeismicTransactionSender = () => {
            const [isConnected, setIsConnected] = useState(false);
            const [walletAddress, setWalletAddress] = useState('');
            const [balance, setBalance] = useState('0.0');
            const [recipientAddress, setRecipientAddress] = useState('');
            const [amount, setAmount] = useState('');
            const [enableEncryption, setEnableEncryption] = useState(false);
            const [selectedEncryptedType, setSelectedEncryptedType] = useState('');
            const [contractAddress, setContractAddress] = useState('');
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(false);

            const encryptedTypes = [
                'Choose type...',
                'suint',
                'seint',
                'sbool',
                'saddress'
            ];

            const handleConnectWallet = () => {
                // Demo wallet connection
                setIsConnected(true);
                setWalletAddress('0x742d35Cc6635C0532925a3b8D3Ac27FAACE6547');
                setBalance('1.234');
            };

            const handleAddNetwork = () => {
                alert('Add Network functionality would be implemented here');
            };

            const handleSendTransaction = async () => {
                if (!recipientAddress || !amount) {
                    alert('Please fill in recipient address and amount');
                    return;
                }

                setLoading(true);
                try {
                    // Simulate transaction
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    const newTx = {
                        hash: '0x' + Math.random().toString(16).substr(2, 64),
                        to: recipientAddress,
                        value: amount,
                        timestamp: new Date().toLocaleString(),
                        status: 'success',
                        encrypted: enableEncryption
                    };
                    
                    setTransactions(prev => [newTx, ...prev]);
                    
                    // Clear form
                    setRecipientAddress('');
                    setAmount('');
                    setEnableEncryption(false);
                    
                    alert(`Transaction sent successfully!\nHash: ${newTx.hash}`);
                    
                } catch (error) {
                    console.error('Transaction error:', error);
                    alert('Transaction failed: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleEncryptData = async () => {
                if (!selectedEncryptedType || selectedEncryptedType === 'Choose type...' || !contractAddress) {
                    alert('Please select encrypted type and contract address');
                    return;
                }

                setLoading(true);
                try {
                    // Simulate encryption
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    const newTx = {
                        hash: '0x' + Math.random().toString(16).substr(2, 64),
                        type: 'encrypted',
                        encryptedType: selectedEncryptedType,
                        contractAddress: contractAddress,
                        timestamp: new Date().toLocaleString(),
                        status: 'success'
                    };
                    
                    setTransactions(prev => [newTx, ...prev]);
                    
                    alert(`Encrypted transaction sent!\nType: ${selectedEncryptedType}\nHash: ${newTx.hash}`);
                    
                } catch (error) {
                    console.error('Encryption error:', error);
                    alert('Encryption failed: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const clearHistory = () => {
                setTransactions([]);
            };

            return (
                <div className="app-container">
                    {/* Header */}
                    <header className="header">
                        <div className="header-content">
                            <h1 className="app-title">Seismic Transaction Sender</h1>
                            <div className="header-controls">
                                <span className="network-status">Seismic devnet</span>
                                <span className={`connection-status ${isConnected ? 'connected' : 'disconnected'}`}>
                                    {isConnected ? 'Connected' : 'Disconnected'}
                                </span>
                                {!isConnected && (
                                    <button className="btn btn-primary btn-sm" onClick={handleConnectWallet}>
                                        Connect Wallet
                                    </button>
                                )}
                                <button className="btn btn-success btn-sm" onClick={handleAddNetwork}>
                                    Add Network
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="main-content">
                        <div className="content-grid">
                            {/* Left Column */}
                            <div className="left-column">
                                {/* Wallet Information */}
                                <div className="card">
                                    <h3 className="card-title">💼 Wallet Information</h3>
                                    <div className="info-section">
                                        <div className="info-item">
                                            <label>Your Address</label>
                                            <div className="info-value">
                                                {isConnected ? walletAddress : 'Connect wallet to see address'}
                                            </div>
                                        </div>
                                        <div className="info-item">
                                            <label>Balance (ETH)</label>
                                            <div className="info-value">{balance}</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Send Transaction */}
                                <div className="card">
                                    <h3 className="card-title">📤 Send Transaction</h3>
                                    <div className="form-section">
                                        <div className="form-group">
                                            <label>Recipient Address</label>
                                            <input
                                                type="text"
                                                className="form-control"
                                                placeholder="0x..."
                                                value={recipientAddress}
                                                onChange={(e) => setRecipientAddress(e.target.value)}
                                            />
                                            <small className="form-text">Enter the recipient's Ethereum address</small>
                                        </div>
                                        <div className="form-group">
                                            <label>Amount (ETH)</label>
                                            <input
                                                type="number"
                                                className="form-control"
                                                placeholder="0.0"
                                                step="0.001"
                                                value={amount}
                                                onChange={(e) => setAmount(e.target.value)}
                                            />
                                            <small className="form-text">Amount to send in ETH</small>
                                        </div>
                                        <div className="form-group">
                                            <div className="form-check">
                                                <input
                                                    type="checkbox"
                                                    className="form-check-input"
                                                    checked={enableEncryption}
                                                    onChange={(e) => setEnableEncryption(e.target.checked)}
                                                />
                                                <label className="form-check-label">
                                                    ✅ Enable Seismic Encryption
                                                </label>
                                            </div>
                                            <small className="form-text">Use Seismic's privacy features for this transaction</small>
                                        </div>
                                        <button 
                                            className="btn btn-primary btn-block"
                                            onClick={handleSendTransaction}
                                            disabled={loading || !isConnected}
                                        >
                                            {loading ? 'Sending...' : '📤 Send Transaction'}
                                        </button>
                                    </div>
                                </div>

                                {/* Encrypted Types Demo */}
                                <div className="card">
                                    <h3 className="card-title">🔐 Encrypted Types Demo</h3>
                                    <div className="form-section">
                                        <div className="form-group">
                                            <label>Select Encrypted Type</label>
                                            <select
                                                className="form-control"
                                                value={selectedEncryptedType}
                                                onChange={(e) => setSelectedEncryptedType(e.target.value)}
                                            >
                                                {encryptedTypes.map((type, index) => (
                                                    <option key={index} value={type}>{type}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="form-group">
                                            <label>Contract Address</label>
                                            <input
                                                type="text"
                                                className="form-control"
                                                placeholder="0x... (contract address for encrypted transaction)"
                                                value={contractAddress}
                                                onChange={(e) => setContractAddress(e.target.value)}
                                            />
                                        </div>
                                        <div className="encrypted-actions">
                                            <button 
                                                className="btn btn-info btn-block mb-2"
                                                disabled={loading}
                                            >
                                                🔐 Encrypt Data
                                            </button>
                                            <button 
                                                className="btn btn-success btn-block"
                                                onClick={handleEncryptData}
                                                disabled={loading || !isConnected}
                                            >
                                                {loading ? 'Sending...' : '📤 Send Encrypted Transaction'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Right Column */}
                            <div className="right-column">
                                {/* Transaction History */}
                                <div className="card">
                                    <div className="card-header">
                                        <h3 className="card-title">📋 Transaction History</h3>
                                        {transactions.length > 0 && (
                                            <button className="btn btn-outline-danger btn-sm" onClick={clearHistory}>
                                                🗑 Clear
                                            </button>
                                        )}
                                    </div>
                                    <div className="transaction-history">
                                        {transactions.length === 0 ? (
                                            <div className="empty-state">
                                                <div className="empty-icon">ℹ️</div>
                                                <p>No transactions yet. Send your first transaction to see it here.</p>
                                            </div>
                                        ) : (
                                            <div className="transaction-list">
                                                {transactions.map((tx, index) => (
                                                    <div key={index} className="transaction-item">
                                                        <div className="transaction-header">
                                                            <span className="transaction-type">
                                                                {tx.type === 'encrypted' ? '🔐' : '💸'} 
                                                                {tx.hash.slice(0, 10)}...{tx.hash.slice(-8)}
                                                            </span>
                                                            <span className={`transaction-status status-${tx.status}`}>
                                                                {tx.status}
                                                            </span>
                                                        </div>
                                                        <div className="transaction-details">
                                                            {tx.type === 'encrypted' ? (
                                                                <>
                                                                    <small>Type: {tx.encryptedType}</small>
                                                                    <small>Contract: {tx.contractAddress?.slice(0, 10)}...</small>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <small>To: {tx.to?.slice(0, 10)}...</small>
                                                                    <small>Amount: {tx.value} ETH</small>
                                                                </>
                                                            )}
                                                            <small>{tx.timestamp}</small>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // Render the application
        try {
            ReactDOM.render(React.createElement(SeismicTransactionSender), document.getElementById('root'));
        } catch (error) {
            console.error('Application render error:', error);
            document.getElementById('root').innerHTML = `
                <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
                    <h2 style="color: #dc3545;">Application Error</h2>
                    <p>An error occurred while starting the application: ${error.message}</p>
                    <button onclick="location.reload()" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                        🔄 Reload
                    </button>
                </div>
            `;
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
