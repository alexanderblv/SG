<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 Seismic Game - Блокчейн Приложение</title>
    <meta name="description" content="Современное блокчейн-приложение с интеграцией Privy Auth SDK и Seismic Devnet">
    
    <!-- Preconnect для лучшей производительности -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React и Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Ethers.js - обновленная версия -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.1/dist/ethers.umd.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Конфигурация Seismic Network
        const seismicNetwork = {
            id: 5124,
            name: 'Seismic Devnet',
            network: 'seismic-devnet',
            nativeCurrency: {
                decimals: 18,
                name: 'Seismic ETH',
                symbol: 'SETH',
            },
            rpcUrls: {
                public: { http: ['https://node-2.seismicdev.net/rpc'] },
                default: { http: ['https://node-2.seismicdev.net/rpc'] },
            },
            blockExplorers: {
                default: { 
                    name: 'Seismic Explorer', 
                    url: 'https://explorer-2.seismicdev.net/' 
                },
            },
            testnet: true,
        };

        // Компонент информации о пользователе (упрощенная версия без Privy)
        const UserInfo = ({ balance, networkInfo }) => (
            <div className="card fade-in">
                <h3 className="text-center mb-3">👤 Информация о сети</h3>
                <div className="info-grid">
                    <div className="info-item">
                        <div className="info-label">Статус</div>
                        <div className="info-value">Готов к использованию</div>
                    </div>
                    <div className="info-item">
                        <div className="info-label">Пример кошелька</div>
                        <div className="info-value">0x742d...E6547</div>
                    </div>
                    <div className="info-item">
                        <div className="info-label">Баланс</div>
                        <div className="info-value">{balance} SETH</div>
                    </div>
                    <div className="info-item">
                        <div className="info-label">Сеть</div>
                        <div className="info-value status-connected">{networkInfo?.name || 'Seismic Devnet'}</div>
                    </div>
                </div>
            </div>
        );

        // Компонент игровых действий
        const GameActions = ({ onSendTransaction, onSendEncrypted, loading }) => (
            <div className="card fade-in">
                <h3 className="text-center mb-3">🎮 Игровые действия</h3>
                <div className="d-grid gap-2">
                    <button 
                        className="btn btn-primary" 
                        onClick={() => onSendTransaction('0x742d35Cc6635C0532925a3b8D3Ac27FAACE6547', '0.001')}
                        disabled={loading}
                    >
                        {loading ? <span className="loading"></span> : '💸'} Отправить тестовую транзакцию
                    </button>
                    <button 
                        className="btn btn-secondary" 
                        onClick={() => onSendEncrypted({ value: 100, recipient: '0x742d35Cc6635C0532925a3b8D3Ac27FAACE6547' }, 'suint')}
                        disabled={loading}
                    >
                        {loading ? <span className="loading"></span> : '🔐'} Отправить зашифрованные данные
                    </button>
                    <button className="btn btn-secondary" disabled>
                        🏆 Начать игру (скоро)
                    </button>
                    <button className="btn btn-secondary" disabled>
                        📊 Статистика (скоро)
                    </button>
                </div>
            </div>
        );

        // Компонент информации о сети
        const NetworkInfo = ({ networkInfo }) => (
            <div className="card fade-in">
                <h3 className="text-center mb-3">🌐 Информация о сети</h3>
                <div className="info-grid">
                    <div className="info-item">
                        <div className="info-label">Chain ID</div>
                        <div className="info-value">{networkInfo?.chainId || '5124'}</div>
                    </div>
                    <div className="info-item">
                        <div className="info-label">Последний блок</div>
                        <div className="info-value">{networkInfo?.blockNumber || 'Загрузка...'}</div>
                    </div>
                    <div className="info-item">
                        <div className="info-label">Gas Price</div>
                        <div className="info-value">{networkInfo?.gasPrice || '0'} Gwei</div>
                    </div>
                    <div className="info-item">
                        <div className="info-label">RPC</div>
                        <div className="info-value">Seismic Node</div>
                    </div>
                </div>
                <div className="text-center mt-3">
                    <a href="https://faucet-2.seismicdev.net/" target="_blank" className="btn btn-primary me-2">
                        🚰 Получить тестовые токены
                    </a>
                    <a href="https://explorer-2.seismicdev.net/" target="_blank" className="btn btn-secondary">
                        🔍 Открыть Explorer
                    </a>
                </div>
            </div>
        );

        // Упрощенная версия входа в систему
        const LoginComponent = ({ onLogin }) => (
            <div className="card text-center">
                <h1>🌊 Добро пожаловать в Seismic Game</h1>
                <p className="mb-3">
                    Современное блокчейн-приложение с поддержкой зашифрованных транзакций
                    и интеграцией с Seismic Devnet.
                </p>
                <button className="btn btn-primary btn-lg" onClick={onLogin}>
                    🚀 Войти в демо-режиме
                </button>
                <div className="mt-3">
                    <small>Демо-версия без интеграции кошелька</small>
                </div>
            </div>
        );

        // Основной компонент приложения (упрощенная версия)
        const SeismicGameApp = () => {
            const [loading, setLoading] = useState(false);
            const [authenticated, setAuthenticated] = useState(false);
            const [balance, setBalance] = useState('0.0');
            const [networkInfo, setNetworkInfo] = useState(null);
            const [transactions, setTransactions] = useState([]);

            // Инициализация приложения
            useEffect(() => {
                if (authenticated) {
                    initializeApp();
                }
            }, [authenticated]);

            const initializeApp = useCallback(async () => {
                try {
                    setLoading(true);
                    await updateNetworkInfo();
                    setBalance('1.234'); // Демо баланс
                } catch (error) {
                    console.error('Ошибка инициализации:', error);
                } finally {
                    setLoading(false);
                }
            }, []);

            const updateNetworkInfo = async () => {
                try {
                    const provider = new ethers.JsonRpcProvider('https://node-2.seismicdev.net/rpc');
                    const network = await provider.getNetwork();
                    const blockNumber = await provider.getBlockNumber();
                    const feeData = await provider.getFeeData();
                    
                    setNetworkInfo({
                        chainId: Number(network.chainId),
                        name: 'Seismic Devnet',
                        blockNumber,
                        gasPrice: ethers.formatUnits(feeData.gasPrice || 0, 'gwei')
                    });
                } catch (error) {
                    console.error('Ошибка получения информации о сети:', error);
                    // Устанавливаем значения по умолчанию
                    setNetworkInfo({
                        chainId: 5124,
                        name: 'Seismic Devnet',
                        blockNumber: 'Недоступно',
                        gasPrice: 'Недоступно'
                    });
                }
            };

            const handleLogin = () => {
                setAuthenticated(true);
            };

            const handleLogout = () => {
                setAuthenticated(false);
                setTransactions([]);
            };

            const handleSendTransaction = async (to, value) => {
                try {
                    setLoading(true);
                    
                    // Имитация отправки транзакции
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    const newTx = {
                        hash: '0x' + Math.random().toString(16).substr(2, 64),
                        to,
                        value,
                        timestamp: new Date().toLocaleString(),
                        status: 'success'
                    };
                    
                    setTransactions(prev => [newTx, ...prev.slice(0, 9)]);
                    alert(`Транзакция отправлена!\nHash: ${newTx.hash}`);
                    
                } catch (error) {
                    console.error('Ошибка отправки транзакции:', error);
                    alert('Ошибка отправки транзакции: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleSendEncrypted = async (data, type) => {
                try {
                    setLoading(true);
                    
                    // Имитация отправки зашифрованной транзакции
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    const newTx = {
                        hash: '0x' + Math.random().toString(16).substr(2, 64),
                        type: 'encrypted',
                        encryptedType: type,
                        timestamp: new Date().toLocaleString(),
                        status: 'success'
                    };
                    
                    setTransactions(prev => [newTx, ...prev.slice(0, 9)]);
                    alert(`Зашифрованная транзакция отправлена!\nType: ${type}\nHash: ${newTx.hash}`);
                    
                } catch (error) {
                    console.error('Ошибка отправки зашифрованной транзакции:', error);
                    alert('Ошибка отправки: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="app-container">
                    {/* Хедер */}
                    <header className="header">
                        <div className="header-content">
                            <a href="#" className="logo">Seismic Game</a>
                            <div>
                                {authenticated ? (
                                    <button className="btn btn-danger" onClick={handleLogout}>
                                        🚪 Выйти
                                    </button>
                                ) : (
                                    <button className="btn btn-primary" onClick={handleLogin}>
                                        🔗 Войти
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Основной контент */}
                    <main className="main-content">
                        {!authenticated ? (
                            // Экран для неавторизованных пользователей
                            <LoginComponent onLogin={handleLogin} />
                        ) : (
                            // Основной интерфейс для авторизованных пользователей
                            <>
                                <UserInfo balance={balance} networkInfo={networkInfo} />
                                <GameActions 
                                    onSendTransaction={handleSendTransaction}
                                    onSendEncrypted={handleSendEncrypted}
                                    loading={loading}
                                />
                                
                                {/* История транзакций */}
                                {transactions.length > 0 && (
                                    <div className="card fade-in">
                                        <h3 className="text-center mb-3">📋 Последние транзакции</h3>
                                        <div className="list-group list-group-flush">
                                            {transactions.slice(0, 5).map((tx, index) => (
                                                <div key={index} className="list-group-item">
                                                    <div className="d-flex justify-content-between">
                                                        <span>
                                                            {tx.type === 'encrypted' ? '🔐' : '💸'} 
                                                            {tx.hash.slice(0, 10)}...
                                                        </span>
                                                        <span className="status-connected">{tx.status}</span>
                                                    </div>
                                                    <small className="text-muted">{tx.timestamp}</small>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                <NetworkInfo networkInfo={networkInfo} />
                            </>
                        )}
                    </main>

                    {/* Футер */}
                    <footer className="footer">
                        <p>&copy; 2024 Seismic Game. Powered by Seismic Devnet</p>
                    </footer>
                </div>
            );
        };

        // Рендер приложения
        try {
            ReactDOM.render(React.createElement(SeismicGameApp), document.getElementById('root'));
        } catch (error) {
            console.error('Ошибка рендера приложения:', error);
            document.getElementById('root').innerHTML = `
                <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
                    <h2 style="color: #dc3545;">Ошибка приложения</h2>
                    <p>Произошла ошибка при запуске приложения: ${error.message}</p>
                    <button onclick="location.reload()" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                        🔄 Перезагрузить
                    </button>
                </div>
            `;
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
